<!DOCTYPE html>
<html lang="hi">

    <head>
        <meta charset="UTF-8">
        <title>Profile Search Page</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f4f4f4;
            }

            .search-container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 40vh;
            }

            .search-container input {
                width: 40%;
                padding: 12px;
                font-size: 16px;
                border-radius: 25px;
                border: 1px solid #ccc;
                outline: none;
                text-align: center;
            }

            .cards {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
                padding: 20px;
            }

            .card {
                background: white;
                width: 250px;
                padding: 20px;
                border-radius: 12px;
                text-align: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
                transition: 0.3s;
            }

            .card:hover {
                transform: scale(1.05);
            }

            .profile-pic {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                margin-top: -60px;
                border: 4px solid white;
                object-fit: cover;
            }

            .card h3 {
                margin: 10px 0 5px;
            }

            .card p {
                margin: 5px 0;
                color: gray;
            }

            .card-container {
                padding-top: 60px;
            }
        </style>
    </head>

    <body>

        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="search" placeholder="Search profile...">
        </div>

        <!-- Profile Cards -->
        <div class="cards" id="cardContainer"></div>

        <!-- Simple Search Filter -->
        <script>
            function renderCard(details) {
                let cardContainer = document.querySelector("#cardContainer");
                cardContainer.textContent = "";

                details.forEach(detail => {
                    cardContainer.innerHTML += `<div class='card'>
                                                   <img src="${detail.image}" class="profile-pic">
                                                   <div class="card-container">
                                                    <h3>${detail.name}</h3>
                                                    <p>${detail.age}</p>
                                                    <p>${detail.profession}</p>
                                                    <p>${detail.location}</p>
                                                   </div>
                                                </div>`;

                });

            }


            let profiles = [
                {
                    "id": 1,
                    "name": "Rahul Sharma",
                    "age": 25,
                    "location": "Delhi",
                    "profession": "Developer",
                    "image": "https://randomuser.me/api/portraits/men/1.jpg"
                },
                {
                    "id": 2,
                    "name": "Pooja Verma",
                    "age": 23,
                    "location": "Mumbai",
                    "profession": "Designer",
                    "image": "https://randomuser.me/api/portraits/women/2.jpg"
                },
                {
                    "id": 3,
                    "name": "Amit Singh",
                    "age": 28,
                    "location": "Patna",
                    "profession": "Engineer",
                    "image": "https://randomuser.me/api/portraits/men/3.jpg"
                },
                {
                    "id": 4,
                    "name": "Neha Gupta",
                    "age": 26,
                    "location": "Jaipur",
                    "profession": "HR Manager",
                    "image": "https://randomuser.me/api/portraits/women/4.jpg"
                },
                {
                    "id": 5,
                    "name": "Vikram Yadav",
                    "age": 30,
                    "location": "Lucknow",
                    "profession": "Trainer",
                    "image": "https://randomuser.me/api/portraits/men/5.jpg"
                },
                {
                    "id": 6,
                    "name": "Sneha Patel",
                    "age": 24,
                    "location": "Ahmedabad",
                    "profession": "Marketing",
                    "image": "https://randomuser.me/api/portraits/women/6.jpg"
                }
            ];

            renderCard(profiles);

            let searchInput = document.querySelector("#search");

            searchInput.addEventListener('input', function (searchVal) {
                let filteredProfile = profiles.filter(function (profile) {
                    return profile.name.toLowerCase().includes(searchInput.value.toLowerCase());
                });
                renderCard(filteredProfile);
            })
        </script>

    </body>

</html>
