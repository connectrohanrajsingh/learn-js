<!DOCTYPE html>
<html lang="hi">

    <head>
        <meta charset="UTF-8">
        <title>Dice Game</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #121212;
                color: #e5e5e5;
                text-align: center;
            }

            h1 {
                margin-top: 20px;
                color: #00d4ff;
            }

            .container {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 50px;
                margin-top: 50px;
                flex-wrap: wrap;
            }

            .player {
                background: #1e1e1e;
                padding: 30px;
                border-radius: 15px;
                width: 220px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
                transition: 0.3s;
            }

            .player:hover {
                transform: scale(1.05);
            }

            .player h2 {
                margin-bottom: 15px;
                color: #ffd166;
            }

            .dice {
                font-size: 60px;
                margin: 20px 0;
            }

            .score {
                font-size: 22px;
                font-weight: bold;
                color: #06d6a0;
            }

            .controls {
                margin-top: 40px;
            }

            button {
                padding: 12px 25px;
                margin: 10px;
                font-size: 16px;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                transition: 0.3s;
            }

            .roll {
                background: #00d4ff;
                color: #121212;
            }

            .reset {
                background: #ef476f;
                color: white;
            }

            button:hover {
                transform: scale(1.1);
                opacity: 0.9;
            }

            .text-center {
                text-align: center;
            }
        </style>
    </head>

    <body>

        <h1>🎲 Dice Game</h1>

        <div class="container">

            <!-- Player 1 -->
            <div class="player">
                <h2>Player 1</h2>
                <div class="dice">
                    <img width="50" id="player1dice" src="data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Cg%3E%3CanimateTransform%20attributeName='transform'%20type='rotate'%20from='0%2050%2050'%20to='360%2050%2050'%20dur='0.5s'%20repeatCount='indefinite'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='10'/%3E%3C/g%3E%3C/svg%3E" alt="dice" />
                </div>
                <div class="score">Score: <span id="player1score">0</span></div>
            </div>

            <!-- Player 2 -->
            <div class="player">
                <h2>Player 2</h2>
                <div class="dice">
                    <img width="50" id="player2dice" src="data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Cg%3E%3CanimateTransform%20attributeName='transform'%20type='rotate'%20from='0%2050%2050'%20to='360%2050%2050'%20dur='0.5s'%20repeatCount='indefinite'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='10'/%3E%3C/g%3E%3C/svg%3E" alt="dice" />
                </div>
                <div class="score">Score: <span id="player2score">0</span></div>
            </div>

        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="roll" id="rolldice" value="player1">Roll Dice (Player 1 )</button>
            <button class="reset" id="clear" value="player1">Clear</button>
        </div>

        <p class="text-center" id="message"></p>


        <script>
            let diceJson = {
                "dice": {
                    "dice1": "data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='10'%20fill='black'/%3E%3C/svg%3E",

                    "dice2": "data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Ccircle%20cx='25'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='75'%20r='10'/%3E%3C/svg%3E",

                    "dice3": "data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Ccircle%20cx='25'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='75'%20r='10'/%3E%3C/svg%3E",

                    "dice4": "data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Ccircle%20cx='25'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='25'%20cy='75'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='75'%20r='10'/%3E%3C/svg%3E",

                    "dice5": "data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Ccircle%20cx='25'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='50'%20cy='50'%20r='10'/%3E%3Ccircle%20cx='25'%20cy='75'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='75'%20r='10'/%3E%3C/svg%3E",

                    "dice6": "data:image/svg+xml;utf8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='100'%3E%3Crect%20rx='20'%20width='100'%20height='100'%20fill='white'/%3E%3Ccircle%20cx='25'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='25'%20r='10'/%3E%3Ccircle%20cx='25'%20cy='50'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='50'%20r='10'/%3E%3Ccircle%20cx='25'%20cy='75'%20r='10'/%3E%3Ccircle%20cx='75'%20cy='75'%20r='10'/%3E%3C/svg%3E"
                },
                "spinner": "https://i.imgur.com/6RMhx.gif"
            }

            let winAt = 5;

            function rollDice(player) {
                let playerDice = `${player}dice`;
                let playerScore = `${player}score`;
                let playerRolled = `${player}rolled`;

                rolledDiceBtn = document.querySelector("#rolldice");
                rolledDiceBtn.disabled = true;
                rolledDiceBtn.style.background = 'grey';


                scoreControl = document.querySelector(`#${playerScore}`);
                currentScore = scoreControl.textContent;

                diceControl = document.querySelector(`#${playerDice}`);
                diceControl.src = diceJson.spinner;

                setTimeout(() => {
                    let rolledNumber = Math.floor(Math.random() * 6) + 1;
                    let rolledDice = `dice${rolledNumber}`;
                    diceControl.src = diceJson.dice[rolledDice];

                    updatedScore = parseInt(currentScore) + parseInt(rolledNumber);
                    scoreControl.textContent = updatedScore;

                    let playerSwitch = { player1: { label: 'Player 2', value: 'player2' }, player2: { label: 'Player 1', value: 'player1' } };

                    let nextPlayer = playerSwitch[player];


                    rolledDiceBtn.value = nextPlayer.value;
                    rolledDiceBtn.textContent = `Roll Dice (${nextPlayer.label} )`;

                    localStorage.setItem(`${playerScore}`, updatedScore);
                    localStorage.setItem(`${playerRolled}`, diceJson.dice[rolledDice]);
                    localStorage.setItem('playerTurn', JSON.stringify(nextPlayer));


                    if (updatedScore >= winAt) {
                        rolledDiceBtn.hidden = true;

                        let resetCounter = 5;
                        let message = setInterval(function () {
                            document.querySelector("#message").textContent = `${player} wins, resetting game in ${resetCounter} seconds`;

                            if (resetCounter < 1) {
                                clearGame();
                                clearInterval(message);
                                return;
                            } else {
                                resetCounter--;
                            }

                        }, 1000)
                    }

                    rolledDiceBtn.disabled = false;
                    rolledDiceBtn.style.background = '#00d4ff';



                }, 1000);
            }


            function initGame() {
                let players = ['player1', 'player2'];

                players.forEach(player => {
                    let playerDice = `${player}dice`;
                    let playerScore = `${player}score`;
                    let playerRolled = `${player}rolled`;


                    savedDiceValue = localStorage.getItem(`${playerDice}`);
                    if (savedDiceValue) {
                        document.querySelector(`#${playerDice}`).textContent = savedDiceValue;
                    }

                    savedScoreValue = localStorage.getItem(`${playerScore}`);
                    if (savedScoreValue) {
                        document.querySelector(`#${playerScore}`).textContent = savedScoreValue;
                        console.log(savedScoreValue);
                        if (savedScoreValue >= winAt) {
                            rolledDiceBtn = document.querySelector("#rolldice");
                            rolledDiceBtn.hidden = true;

                            let resetCounter = 5;
                            let message = setInterval(function () {
                                document.querySelector("#message").textContent = `${player} wins, resetting game in ${resetCounter} seconds`;

                                if (resetCounter < 1) {
                                    clearGame();
                                    clearInterval(message);
                                    return;
                                } else {
                                    resetCounter--;
                                }

                            }, 1000)
                        }
                    }

                    savedRolledDice = localStorage.getItem(`${playerRolled}`);
                    if (savedRolledDice) {
                        diceControl = document.querySelector(`#${playerDice}`).src = savedRolledDice;
                    }
                });

                savedTurnString = localStorage.getItem('playerTurn');
                if (savedTurnString) {

                    nextPlayer = JSON.parse(savedTurnString);

                    rolledDiceBtn = document.querySelector("#rolldice")
                    rolledDiceBtn.value = nextPlayer.value;
                    rolledDiceBtn.textContent = `Roll Dice (${nextPlayer.label} )`;
                }
            }

            function clearGame() {
                rolledDiceBtn = document.querySelector("#rolldice");
                rolledDiceBtn.disabled = true;
                rolledDiceBtn.style.background = 'grey';

                localStorage.clear();
                location.reload();
            }


            let clear = document.querySelector("#clear");
            clear.addEventListener('click', function () {
                clearGame();
            })


            let dice = document.querySelector("#rolldice");
            dice.addEventListener("click", function (dice) {
                rollDice(dice.target.value);
            })



            initGame();
        </script>
    </body>

</html>
